apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ravishop-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
  - host: ravishop.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ravishop-service
            port:
              number: 80
